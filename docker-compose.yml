version: '3.8' //Ya no es necesaria esta linea para versiones nuevas de docker

services:
  postgres:
    image: postgres:15
    container_name: ordenatec_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ordenatec
      POSTGRES_PASSWORD: ordenatec_dev_password
      POSTGRES_DB: ordenatec
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ordenatec']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ordenatec_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ordenatec.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
